name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >
            p/python
            p/owasp-top-ten
            p/jwt
            p/secrets
        continue-on-error: true

      - name: Export Semgrep results to JSON
        run: |
          pip install semgrep
          mkdir -p reports
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/jwt \
            --config p/secrets \
            --json \
            --output reports/semgrep.json \
            services/ || true
          cat reports/semgrep.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(f'Semgrep found {len(data.get(\"results\", []))} issues')
          "

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep.json
          retention-days: 30

  dependency-scan:
    name: Dependency Scan (Snyk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snyk
        run: npm install -g snyk

      - name: Run Snyk on auth-service
        run: |
          mkdir -p reports
          cd services/auth-service
          pip install -r requirements.txt || true
          snyk test --file=requirements.txt --package-manager=pip --json > ../../reports/snyk-auth.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk on data-service
        run: |
          cd services/data-service
          pip install -r requirements.txt || true
          snyk test --file=requirements.txt --package-manager=pip --json > ../../reports/snyk-data.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Merge Snyk reports
        run: |
          python3 << 'EOF'
          import json
          merged = {"vulnerabilities": [], "dependencyCount": 0}
          for path in ["reports/snyk-auth.json", "reports/snyk-data.json"]:
              try:
                  with open(path) as f:
                      data = json.load(f)
                  vulns = data.get("vulnerabilities", [])
                  merged["vulnerabilities"].extend(vulns)
                  merged["dependencyCount"] += data.get("dependencyCount", 0)
                  print(f"{path}: {len(vulns)} vulnerabilities")
              except Exception as e:
                  print(f"Could not read {path}: {e}")
          with open("reports/snyk.json", "w") as f:
              json.dump(merged, f, indent=2)
          print(f"Total: {len(merged['vulnerabilities'])} vulnerabilities")
          EOF

      - name: Upload Snyk report
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: reports/snyk.json
          retention-days: 30

  ai-analysis:
    name: AI Security Analysis (Gemini)
    runs-on: ubuntu-latest
    needs: [ sast, dependency-scan ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r ai-analyzer/requirements.txt

      - name: Download Semgrep report
        uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports/

      - name: Download Snyk report
        uses: actions/download-artifact@v4
        with:
          name: snyk-report
          path: reports/

      - name: Run AI Analyzer
        run: |
          python ai-analyzer/analyzer.py \
            --semgrep reports/semgrep.json \
            --snyk    reports/snyk.json \
            --output  reports/ai-report.json
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Generate HTML report
        if: always()
        run: |
          python ai-analyzer/generate_report.py \
            reports/ai-report.json \
            reports/index.html \
            ${{ github.sha }} \
            ${{ github.run_id }}

      - name: Upload AI report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-security-report
          path: |
            reports/ai-report.json
            reports/index.html
          retention-days: 30

      - name: Print summary
        if: always()
        run: |
          python3 << 'EOF'
          import json
          try:
              with open("reports/ai-report.json") as f:
                  report = json.load(f)
              s = report.get("summary", {})
              print("=" * 50)
              print(f"Total:          {s.get('total_found', 0)}")
              print(f"True Positives: {s.get('true_positives', 0)}")
              print(f"False Positives:{s.get('false_positives', 0)}")
              print(f"Blocking:       {s.get('blocking', 0)}")
              print(f"Status:         {s.get('pipeline_status', 'UNKNOWN')}")
              print("=" * 50)
          except Exception as e:
              print(f"Could not read report: {e}")
          EOF

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [ ai-analysis ]
    steps:
      - name: Download AI report
        uses: actions/download-artifact@v4
        with:
          name: ai-security-report
          path: reports/

      - name: Check Quality Gate
        run: |
          python3 << 'EOF'
          import json, sys
          try:
              with open("reports/ai-report.json") as f:
                  report = json.load(f)
          except Exception as e:
              print(f"No report: {e} — PASS")
              sys.exit(0)
          s = report.get("summary", {})
          status   = s.get("pipeline_status", "PASS")
          blocking = s.get("blocking", 0)
          if status == "FAIL":
              print(f"❌ QUALITY GATE FAILED — {blocking} blocking issues")
              for r in report.get("results", []):
                  if r.get("verdict") == "TRUE_POSITIVE" and r.get("severity") in ("critical", "high"):
                      print(f"  [{r['severity'].upper()}] {r['type']} in {r['file']}:{r['line']}")
              sys.exit(1)
          else:
              print("✅ QUALITY GATE PASSED")
          EOF

  publish-report:
    name: Publish HTML Report
    runs-on: ubuntu-latest
    needs: [ quality-gate ]
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Download AI report
        uses: actions/download-artifact@v4
        with:
          name: ai-security-report
          path: reports/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports
          publish_branch: gh-pages
          commit_message: "Security report — ${{ github.sha }}"

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [ quality-gate ]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          push: false
          tags: devsecops/auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build data-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/data-service
          push: false
          tags: devsecops/data-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "✅ Images built:"
          echo "  devsecops/auth-service:${{ github.sha }}"
          echo "  devsecops/data-service:${{ github.sha }}"
