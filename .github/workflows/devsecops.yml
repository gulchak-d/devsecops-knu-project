name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >
            p/python
            p/owasp-top-ten
            p/jwt
            p/secrets
        continue-on-error: true

      - name: Export Semgrep results to JSON
        run: |
          pip install semgrep
          mkdir -p reports
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/jwt \
            --config p/secrets \
            --json \
            --output reports/semgrep.json \
            services/ || true
          echo "Semgrep scan complete"
          cat reports/semgrep.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          findings = data.get('results', [])
          print(f'Semgrep found {len(findings)} issues')
          "

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep.json
          retention-days: 30

  dependency-scan:
    name: Dependency Scan (Snyk)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snyk
        run: npm install -g snyk

      - name: Run Snyk on auth-service
        run: |
          mkdir -p reports
          cd services/auth-service
          pip install -r requirements.txt || true
          snyk test \
            --file=requirements.txt \
            --package-manager=pip \
            --json > ../../reports/snyk-auth.json || true
          echo "Snyk auth-service scan complete"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk on data-service
        run: |
          cd services/data-service
          pip install -r requirements.txt || true
          snyk test \
            --file=requirements.txt \
            --package-manager=pip \
            --json > ../../reports/snyk-data.json || true
          echo "Snyk data-service scan complete"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Merge Snyk reports
        run: |
          python3 << 'EOF'
          import json

          merged = {"vulnerabilities": [], "dependencyCount": 0}

          for path in ["reports/snyk-auth.json", "reports/snyk-data.json"]:
              try:
                  with open(path) as f:
                      data = json.load(f)
                  vulns = data.get("vulnerabilities", [])
                  merged["vulnerabilities"].extend(vulns)
                  merged["dependencyCount"] += data.get("dependencyCount", 0)
                  print(f"{path}: {len(vulns)} vulnerabilities")
              except Exception as e:
                  print(f"Could not read {path}: {e}")

          with open("reports/snyk.json", "w") as f:
              json.dump(merged, f, indent=2)

          print(f"Total: {len(merged['vulnerabilities'])} vulnerabilities")
          EOF

      - name: Upload Snyk report
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: reports/snyk.json
          retention-days: 30

  ai-analysis:
    name: AI Security Analysis (Gemini)
    runs-on: ubuntu-latest
    needs: [ sast, dependency-scan ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AI Analyzer dependencies
        run: |
          pip install -r ai-analyzer/requirements.txt

      - name: Download Semgrep report
        uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports/

      - name: Download Snyk report
        uses: actions/download-artifact@v4
        with:
          name: snyk-report
          path: reports/

      - name: Run AI Analyzer
        id: ai_analysis
        run: |
          python ai-analyzer/analyzer.py \
            --semgrep reports/semgrep.json \
            --snyk    reports/snyk.json \
            --output  reports/ai-report.json
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload AI report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-security-report
          path: reports/ai-report.json
          retention-days: 30

      - name: Print AI report summary
        if: always()
        run: |
          python3 << 'EOF'
          import json

          try:
              with open("reports/ai-report.json") as f:
                  report = json.load(f)

              summary = report.get("summary", {})
              print("=" * 50)
              print("AI SECURITY ANALYSIS RESULTS")
              print("=" * 50)
              print(f"Total findings:   {summary.get('total_found', 0)}")
              print(f"True Positives:   {summary.get('true_positives', 0)}")
              print(f"False Positives:  {summary.get('false_positives', 0)}")
              print(f"Needs Review:     {summary.get('needs_review', 0)}")
              print(f"Blocking:         {summary.get('blocking', 0)}")
              print(f"Pipeline status:  {summary.get('pipeline_status', 'UNKNOWN')}")
              print("=" * 50)

              for result in report.get("results", []):
                  if result.get("verdict") == "TRUE_POSITIVE":
                      print(f"  🔴 {result['id']} | {result['severity'].upper()} | {result['type']}")
                      print(f"     {result['explanation'][:100]}")

          except Exception as e:
              print(f"Could not read report: {e}")
          EOF

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [ ai-analysis ]

    steps:
      - name: Download AI report
        uses: actions/download-artifact@v4
        with:
          name: ai-security-report
          path: reports/

      - name: Check Quality Gate
        run: |
          python3 << 'EOF'
          import json
          import sys

          try:
              with open("reports/ai-report.json") as f:
                  report = json.load(f)
          except Exception as e:
              print(f"Could not read AI report: {e}")
              print("Quality Gate: PASS (no report available)")
              sys.exit(0)

          summary  = report.get("summary", {})
          status   = summary.get("pipeline_status", "PASS")
          blocking = summary.get("blocking", 0)
          reason   = summary.get("failure_reason", "")

          print(f"Pipeline status: {status}")
          print(f"Blocking issues: {blocking}")

          if status == "FAIL":
              print(f"\n❌ QUALITY GATE FAILED")
              print(f"Reason: {reason}")
              print("\nFix these issues before merging:")
              for r in report.get("results", []):
                  if r.get("verdict") == "TRUE_POSITIVE" and r.get("severity") in ("critical", "high"):
                      print(f"  - [{r['severity'].upper()}] {r['type']} in {r['file']}:{r['line']}")
                      if r.get("remediation"):
                          print(f"    Fix: {r['remediation'][:150]}")
              sys.exit(1)
          else:
              print("\n✅ QUALITY GATE PASSED")
              sys.exit(0)
          EOF

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [ quality-gate ]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          push: false
          tags: devsecops/auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build data-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/data-service
          push: false
          tags: devsecops/data-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "✅ Docker images built successfully"
          echo "  - devsecops/auth-service:${{ github.sha }}"
          echo "  - devsecops/data-service:${{ github.sha }}"