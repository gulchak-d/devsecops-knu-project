name: DevSecOps Pipeline

on: [push]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Semgrep (SAST)
        run: |
          pip install semgrep
          semgrep scan --json -o semgrep_report.json .
        continue-on-error: true

      - name: Install and Run Snyk (Dependency Scan)
        run: |
          npm install -g snyk
          snyk test --all-projects --json > snyk_report.json || true
        continue-on-error: true